name: Run History Action

on:
  schedule:
    - cron: '55 0/4 * * *' # Every 4 hours (00:55, 04:55, 08:55, 12:55, 16:55, 20:55)
  workflow_dispatch: # Manual trigger

jobs:
  log-history:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push changes back to the repo
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "requirements-history.txt"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: uv pip install --system -r requirements-history.txt

      - name: Create Data directory
        run: mkdir -p Data

      - name: Run portfolio history logger
        env:
          KALSHI_ACCESS_KEY: ${{ secrets.KALSHI_ACCESS_KEY }}
          KALSHI_RSA_PRIVATE_KEY: ${{ secrets.KALSHI_RSA_PRIVATE_KEY }}
          POLYMARKET_WALLET_ADDRESS: ${{ secrets.POLYMARKET_WALLET_ADDRESS }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SKIP_SEMANTIC_MATCHING: "true"
        run: python log_portfolio_history.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add Data/portfolio_history.csv Data/capital_changes.csv || true
          git commit -m "chore: update portfolio history [skip ci]" || echo "No changes to commit"
          git push